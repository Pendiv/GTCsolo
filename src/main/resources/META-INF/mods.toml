# issueTrackerURL = ""

[[mods]]
modId = "gtcsolo"
version = "1.0-SNAPSHOT"
displayName = "GTCsoloEU"
authors = "Author"
description = '''GTCsoloEU Mod'''

# --- 依存関係設定 (ここが最重要) ---

# 1. Minecraft本体
[[dependencies.gtcsolo]]
modId = "minecraft"
mandatory = true
versionRange = "[1.20.1,1.21)"
ordering = "NONE"
side = "BOTH"

# 2. Forge
[[dependencies.gtcsolo]]
modId = "forge"
mandatory = true
versionRange = "[47,)"
ordering = "NONE"
side = "BOTH"

# 3. GregTechCEu Modern
# ordering="AFTER" により、必ずGTCEuの後に読み込まれるよう強制します
[[dependencies.gtcsolo]]
modId = "gtceu"
mandatory = true
versionRange = "[1.6.4,)"
ordering = "AFTER"
side = "BOTH"

# 4. Mekanism（必須 — ChemicalCapability 経由で chemical を recipe input として扱う）
[[dependencies.gtcsolo]]
modId = "mekanism"
mandatory = true
versionRange = "[10.4,)"
ordering = "AFTER"
side = "BOTH"

# 5. EvolvedMekanism（任意 — あれば追加素材を登録）
[[dependencies.gtcsolo]]
modId = "evolvedmekanism"
mandatory = false
versionRange = "[1.2,)"
ordering = "AFTER"
side = "BOTH"

# 6. AE2（必須 — GTCEu前提環境のため）
[[dependencies.gtcsolo]]
modId = "ae2"
mandatory = true
versionRange = "[15.0,)"
ordering = "AFTER"
side = "BOTH"

# 7. Jade（任意 — カスタムプロバイダを統合する場合）
[[dependencies.gtcsolo]]
modId = "jade"
mandatory = false
versionRange = "[11.0,)"
ordering = "AFTER"
side = "CLIENT"